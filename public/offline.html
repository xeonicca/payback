<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1, viewport-fit=cover">
  <title>Payback</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #e2e8f0; /* slate-200 */
      min-height: 100vh;
      min-height: 100svh;
    }
    .navbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: env(safe-area-inset-top, 0) 1rem 1rem;
      background: linear-gradient(to bottom, #334155 10%, #94a3b8 80%, #e2e8f0);
    }
    .navbar-inner {
      max-width: 72rem;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
    }
    .avatar-skeleton {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
    }
    .main {
      max-width: 72rem;
      margin: 0 auto;
      padding: 0 1.5rem 7.5rem;
    }
    .skeleton {
      background: #fff;
      border-radius: 0.75rem;
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .skeleton-line {
      background: #e2e8f0;
      border-radius: 0.375rem;
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .card {
      background: #fff;
      border-radius: 0.75rem;
      border: 1px solid #e2e8f0;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .loading-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 0;
      gap: 1rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e2e8f0;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 0.875rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <!-- Navbar skeleton -->
  <div class="navbar">
    <div class="navbar-inner">
      <img class="logo" src="/logo-transparent.png" alt="Payback" width="80" height="80">
      <div class="avatar-skeleton"></div>
    </div>
  </div>

  <!-- Content skeleton -->
  <div class="main">
    <!-- Title skeleton -->
    <div style="padding: 0.5rem 0 1rem">
      <div class="skeleton-line" style="height: 1.5rem; width: 40%; margin-bottom: 0.5rem"></div>
      <div class="skeleton-line" style="height: 0.875rem; width: 60%"></div>
    </div>

    <!-- Card skeletons -->
    <div class="card">
      <div class="skeleton-line" style="height: 1rem; width: 30%; margin-bottom: 1rem"></div>
      <div class="skeleton-line" style="height: 2rem; width: 50%; margin-bottom: 0.75rem"></div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem">
        <div class="skeleton-line" style="height: 3.5rem; border-radius: 0.5rem"></div>
        <div class="skeleton-line" style="height: 3.5rem; border-radius: 0.5rem"></div>
      </div>
    </div>

    <div class="card">
      <div class="loading-center">
        <div class="spinner"></div>
        <p class="loading-text">載入中...</p>
      </div>
    </div>
  </div>
</body>
</html>
